name: iOS Build & TestFlight

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build web assets
        working-directory: client
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add iOS platform (if not present)
        working-directory: client
        run: |
          set -eo pipefail
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        working-directory: client
        run: npx cap sync ios

      - name: Patch Podfile for CI signing
        working-directory: client/ios/App
        run: |
          set -eo pipefail
          ruby ../../../.github/patch_podfile.rb
          pod install

      - name: Import distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -eo pipefail
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Import provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          set -eo pipefail
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID="$(security cms -D -i "$PP_PATH" \
            | plutil -extract UUID raw -)"
          cp "$PP_PATH" \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision

          echo "PROVISIONING_PROFILE_UUID=$PP_UUID" >> "$GITHUB_ENV"

      - name: Set provisioning profile on App target
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        run: |
          set -eo pipefail
          gem install xcodeproj --no-document 2>/dev/null
          ruby .github/set_app_profile.rb \
            client/ios/App/App.xcodeproj \
            "$PROVISIONING_PROFILE_UUID"

      - name: Archive
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
        run: |
          # CODE_SIGN_STYLE and PROVISIONING_PROFILE are set per-target in the
          # xcodeproj (App=Manual+profile, Pods=Automatic). Do NOT override
          # CODE_SIGN_IDENTITY or CODE_SIGN_STYLE globally — it conflicts with
          # Automatic signing on the Pod targets.
          xcodebuild archive \
            -workspace client/ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/squawk.xcarchive \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            2>&1 || true
          if [ ! -d /tmp/squawk.xcarchive ]; then
            echo "Archive not produced — xcodebuild failed (see output above)"
            exit 1
          fi
          echo "Archive succeeded: /tmp/squawk.xcarchive"

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
        run: |
          set -eo pipefail
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROVISIONING_PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Package IPA from archive
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
        run: |
          set -eo pipefail
          # Instead of xcodebuild -exportArchive (which re-signs all frameworks
          # and demands profiles for each), we sign the .app ourselves and
          # package it as an IPA.
          APP_PATH=$(find /tmp/squawk.xcarchive/Products -name '*.app' | head -1)
          echo "App: $APP_PATH"

          # Sign all frameworks inside the app with the distribution identity
          find "$APP_PATH" -name '*.framework' -type d | while IFS= read -r fw; do
            echo "Signing: $fw"
            codesign --force --sign "$CODE_SIGN_IDENTITY" --timestamp "$fw"
          done

          # Extract entitlements from the provisioning profile
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/${PROVISIONING_PROFILE_UUID}.mobileprovision"
          ENTITLEMENTS_PATH="/tmp/entitlements.plist"
          security cms -D -i "$PP_PATH" | plutil -extract Entitlements xml1 -o "$ENTITLEMENTS_PATH" -
          echo "Entitlements extracted to $ENTITLEMENTS_PATH"

          # Sign the app bundle itself using the provisioning profile + entitlements
          cp "$PP_PATH" "$APP_PATH/embedded.mobileprovision"
          codesign --force --sign "$CODE_SIGN_IDENTITY" \
            --entitlements "$ENTITLEMENTS_PATH" \
            --timestamp \
            "$APP_PATH"

          # Package as IPA
          mkdir -p /tmp/squawk-export/Payload
          cp -r "$APP_PATH" /tmp/squawk-export/Payload/
          cd /tmp/squawk-export
          zip -r Squawk.ipa Payload
          echo "IPA created: /tmp/squawk-export/Squawk.ipa"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.CONTENT }}
        run: |
          set -eo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode -o "$API_KEY_PATH"
          IPA_PATH="/tmp/squawk-export/Squawk.ipa"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_KEY_ISSUER_ID" \
            --apiKeyPath "$API_KEY_PATH"

      - name: Cleanup secrets
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && security list-keychains | grep -q "$KEYCHAIN_PATH"; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f "$RUNNER_TEMP/build_certificate.p12" \
                "$RUNNER_TEMP/build_pp.mobileprovision" \
                "$RUNNER_TEMP/AuthKey_"*.p8 \
                /tmp/ExportOptions.plist || true
